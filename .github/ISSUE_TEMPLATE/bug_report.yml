name: "Bug Report"
description: "Report a software bug or unexpected behavior"
title: "[BUG]: "
labels: ["bug", "triage-needed"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: app-name
    attributes:
      label: "What app are you using?"
      description: "Enter the name or component of the application."
      placeholder: "e.g. AI Chatbot, Automation Bot, Decision Engine"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: "Describe the bug"
      description: "A clear and concise description of what the bug is."
      placeholder: "Example: The login button does not respond when clicked."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Version"
      description: "Which version of the software are you using?"
      placeholder: "e.g. v1.2.3"
  - type: textarea
    id: logs
    attributes:
      label: "Relevant log output"
      description: "Please copy and paste any relevant log output."
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: "Before submitting"
      options:
        - label: "I have searched existing issues to ensure this is not a duplicate."
          required: true
        - label: "I am using the latest version of the app."
          required: true

name: "Feature Request"
description: "Suggest an idea or improvement for this project"
title: "[FEATURE]: "
labels: ["enhancement", "triage-needed"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! We'd love to hear how we can improve.
  - type: input
    id: app-name
    attributes:
      label: "What app are you using?"
      description: "Enter the name of the application this suggestion is for."
      placeholder: "e.g. Katia Color Picker, AI Chatbot, To-Do List"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      description: "A clear and concise description of what the problem is (e.g. I'm always frustrated when...)."
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description: "Any other solutions or features you've thought of?"
  - type: textarea
    id: additional-context
    attributes:
      label: "Additional context"
      description: "Add any other context, screenshots, or mockups here."
